<svg width="800" height="60" viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .scroll-group {
      animation: slide-skills 25s linear infinite;
    }
    @keyframes slide-skills {
      0% { transform: translateX(0px); }
      100% { transform: translateX(-840px); }
    }
    .skill-box {
      fill: #13141f;
      stroke: #25283a;
      stroke-width: 1.5;
      rx: 8;
      transition: fill 0.3s;
    }
    .skill-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      font-size: 13px;
      fill: #a0a6c0;
    }
  </style>
  
  <!-- Outer border wrapper -->
  <rect width="800" height="60" rx="10" fill="#090a0f" stroke="#1c1d28" stroke-width="1.5"/>
  
  <g clip-path="url(#marquee-clip)">
    <g class="scroll-group">
      <!-- First Set of Skills (7 items, each 110px width + 10px spacing = 120px offset. Total width = 840px) -->
      <g transform="translate(10, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">💻 React.js</text>
      </g>
      <g transform="translate(130, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🟢 Node.js</text>
      </g>
      <g transform="translate(250, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🚀 Express</text>
      </g>
      <g transform="translate(370, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🍃 MongoDB</text>
      </g>
      <g transform="translate(490, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🐍 Python</text>
      </g>
      <g transform="translate(610, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🦄 Django</text>
      </g>
      <g transform="translate(730, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🤖 Gemini AI</text>
      </g>
      
      <!-- Duplicate Set of Skills for Infinite Loop Scroll (offset by 840px) -->
      <g transform="translate(850, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">💻 React.js</text>
      </g>
      <g transform="translate(970, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🟢 Node.js</text>
      </g>
      <g transform="translate(1090, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🚀 Express</text>
      </g>
      <g transform="translate(1210, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🍃 MongoDB</text>
      </g>
      <g transform="translate(1330, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🐍 Python</text>
      </g>
      <g transform="translate(1450, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🦄 Django</text>
      </g>
      <g transform="translate(1570, 10)">
        <rect width="110" height="40" class="skill-box"/>
        <text x="55" y="25" text-anchor="middle" class="skill-text">🤖 Gemini AI</text>
      </g>
    </g>
  </g>
  
  <defs>
    <clipPath id="marquee-clip">
      <rect x="2" y="2" width="796" height="56" rx="8"/>
    </clipPath>
  </defs>
</svg>
