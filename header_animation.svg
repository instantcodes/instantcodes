<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes grid-move {
      0% { transform: translateY(0); }
      100% { transform: translateY(30px); }
    }
    @keyframes neon-glow {
      0%, 100% { filter: drop-shadow(0 0 2px #ff2a85) drop-shadow(0 0 10px #ff2a85); }
      50% { filter: drop-shadow(0 0 6px #ff2a85) drop-shadow(0 0 20px #ff2a85); }
    }
    @keyframes text-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .grid-lines {
      stroke: #321c50;
      stroke-width: 1.5;
      animation: grid-move 1.2s linear infinite;
    }
    .glowing-title {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      font-size: 34px;
      fill: #ffffff;
      letter-spacing: 3px;
      animation: neon-glow 3s ease-in-out infinite;
    }
    .typing-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 16px;
      fill: #00f0ff;
      letter-spacing: 2px;
    }
    .cursor {
      fill: #00f0ff;
      animation: text-blink 1s step-end infinite;
    }
  </style>
  <!-- Background Card -->
  <rect width="800" height="200" fill="#090a0f" rx="12" stroke="#1c1d28" stroke-width="1.5"/>
  
  <!-- Radial Neon Glow behind -->
  <circle cx="400" cy="90" r="160" fill="url(#bg-glow)" opacity="0.35"/>
  
  <!-- Perspective Grid -->
  <g clip-path="url(#grid-clip)">
    <!-- Moving horizontal grid lines -->
    <g class="grid-lines">
      <line x1="-200" y1="100" x2="1000" y2="100" />
      <line x1="-200" y1="130" x2="1000" y2="130" />
      <line x1="-200" y1="160" x2="1000" y2="160" />
      <line x1="-200" y1="190" x2="1000" y2="190" />
      <line x1="-200" y1="220" x2="1000" y2="220" />
      <line x1="-200" y1="250" x2="1000" y2="250" />
    </g>
    
    <!-- Static perspective ray lines -->
    <g stroke="#321c50" stroke-width="1.5">
      <line x1="400" y1="90" x2="-400" y2="200" />
      <line x1="400" y1="90" x2="-200" y2="200" />
      <line x1="400" y1="90" x2="0" y2="200" />
      <line x1="400" y1="90" x2="200" y2="200" />
      <line x1="400" y1="90" x2="400" y2="200" />
      <line x1="400" y1="90" x2="600" y2="200" />
      <line x1="400" y1="90" x2="800" y2="200" />
      <line x1="400" y1="90" x2="1000" y2="200" />
      <line x1="400" y1="90" x2="1200" y2="200" />
    </g>
  </g>
  
  <!-- Cyberpunk Glowing Title -->
  <text x="400" y="85" text-anchor="middle" class="glowing-title">ANANDHU KRISHNA S</text>
  
  <!-- Subtitle Typing Concept -->
  <text x="400" y="125" text-anchor="middle" class="typing-text">MERN STACK • DJANGO • AI INTEGRATIONS</text>
  <rect x="625" y="112" width="10" height="16" class="cursor"/>

  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bf5af2" />
      <stop offset="100%" stop-color="#090a0f" stop-opacity="0" />
    </radialGradient>
    <clipPath id="grid-clip">
      <rect x="0" y="95" width="800" height="105" rx="12"/>
    </clipPath>
  </defs>
</svg>
